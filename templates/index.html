<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeroSMS Ultra — Mega Brutal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(22, 22, 50, 0.8);
            --border: rgba(99, 102, 241, 0.2);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --cyan: #06b6d4;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --purple: #a855f7;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --text-bright: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(168,85,247,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%; max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(99,102,241,0.1);
            text-align: center;
        }
        .login-box h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .login-box p { color: var(--text-dim); margin-bottom: 32px; font-size: 14px; }

        /* INPUTS */
        input {
            width: 100%; padding: 14px 18px;
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        /* BUTTONS */
        .btn {
            padding: 14px 28px;
            border: none; border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600; font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #818cf8); color: white; box-shadow: 0 4px 20px var(--accent-glow); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px var(--accent-glow); }
        .btn-danger { background: linear-gradient(135deg, var(--red), #f87171); color: white; }
        .btn-ghost { background: rgba(99, 102, 241, 0.1); color: var(--accent); border: 1px solid var(--border); }
        .btn-ghost:hover { background: rgba(99, 102, 241, 0.2); }
        .btn-success { background: linear-gradient(135deg, var(--green), #34d399); color: white; box-shadow: 0 4px 20px rgba(16,185,129,0.3); }
        .btn-full { width: 100%; justify-content: center; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 12px; }
        .header h1 { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-bal { display: flex; align-items: center; gap: 10px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 8px 16px; border-radius: 12px; }
        .header-bal .val { font-weight: 800; color: var(--green); }

        /* API BOX */
        .api-box { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 24px; border: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; backdrop-filter: blur(10px); position: relative; overflow: hidden; }
        .stat-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 800; }

        /* COUNTRY GRID */
        .country-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .country-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .country-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 40px rgba(99,102,241,0.2); }
        .country-card.selected { border-color: var(--accent); background: rgba(99,102,241,0.15); box-shadow: 0 0 25px var(--accent-glow); }
        .country-card .flag { font-size: 32px; margin-bottom: 8px; }
        .country-card .name { font-weight: 700; font-size: 14px; }

        /* AUTOBUY PANEL */
        .autobuy-panel { background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.15)); border: 1px solid var(--accent); border-radius: 16px; padding: 24px; margin-bottom: 24px; display: none; }
        .autobuy-panel.active { display: block; animation: fadeIn 0.4s; }
        .ab-stats { display: flex; justify-content: space-around; text-align: center; gap: 10px; }
        .ab-stat .val { font-size: 26px; font-weight: 900; color: var(--cyan); }
        .ab-stat .lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* ORDER ITEM - TELEGRAM STYLE */
        .orders-container { display: flex; flex-direction: column; gap: 10px; }
        .order-card { 
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; animation: slideIn 0.3s;
        }
        .order-info { display: flex; align-items: center; gap: 16px; }
        .order-num-box { display: flex; align-items: center; background: rgba(0,0,0,0.3); padding: 8px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .cc-code { color: var(--accent); font-weight: 800; font-size: 17px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: 0.2s; }
        .cc-code:hover { background: rgba(99,102,241,0.2); }
        .phone-num { color: #fff; font-weight: 800; font-size: 17px; margin-left: 6px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: 0.2s; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 10px; }
        .phone-num:hover { background: rgba(255,255,255,0.1); }
        
        .otp-box { background: rgba(16,185,129,0.15); color: var(--green); padding: 8px 16px; border-radius: 10px; font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .order-meta { text-align: right; }
        .timer { color: var(--yellow); font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        
        /* TOAST */
        .toast-box { position: fixed; top: 20px; right: 20px; z-index: 9999; pointer-events: none; }
        .toast { background: var(--bg-card); padding: 12px 24px; border-radius: 12px; border: 1px solid var(--accent); margin-bottom: 8px; animation: slideIn 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.4); backdrop-filter: blur(20px); font-size: 14px; }

        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hidden { display: none !important; }
        .copy-hint { font-size: 9px; color: var(--text-dim); margin-top: 2px; text-align: center; display: block; }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h1>⚡ HeroSMS MEGA</h1>
        <p>Ultra Brutal Web Dashboard v6.0</p>
        <input type="password" id="passInput" placeholder="Password Akses" style="margin-bottom: 16px;">
        <button class="btn btn-primary btn-full" onclick="login()">🔓 Buka Dashboard</button>
    </div>
</div>

<!-- Main -->
<div id="mainApp" class="container hidden">
    <div class="header">
        <h1>⚡ HeroSMS MEGA</h1>
        <div class="header-bal">
            <span>Saldo: </span>
            <span class="val" id="balVal">0.00</span>
            <button class="btn btn-ghost" onclick="socket.emit('get_balance')" style="padding: 4px 8px; border-radius: 8px;">🔄</button>
        </div>
    </div>

    <div class="api-box">
        <input type="text" id="apiInput" placeholder="Masukkan API Key Hero-SMS">
        <button class="btn btn-primary" onclick="setKey()">Simpan Key</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="label">Total Order</div><div class="value" id="statT">0</div></div>
        <div class="stat-card"><div class="label">OTP Ready</div><div class="value" style="color:var(--green)" id="statO">0</div></div>
        <div class="stat-card"><div class="label">Menunggu</div><div class="value" style="color:var(--yellow)" id="statW">0</div></div>
    </div>

    <div class="country-grid" id="cGrid"></div>

    <div style="background:var(--bg-card); border-radius:16px; padding:24px; margin-bottom:24px; border:1px solid var(--border)">
        <h3 id="selName" style="margin-bottom:16px; color:var(--text-bright)">🛒 Pilih Negara Menang War</h3>
        <div style="display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap">
            <button class="btn btn-ghost" style="width:50px" onclick="buy(1)">1</button>
            <button class="btn btn-ghost" style="width:50px" onclick="buy(2)">2</button>
            <button class="btn btn-ghost" style="width:50px" onclick="buy(5)">5</button>
            <button class="btn btn-ghost" style="width:50px" onclick="buy(10)">10</button>
        </div>
        <div style="display:flex; gap:12px">
            <button class="btn btn-success" id="btnA" onclick="startAB()">🚀 START MEGA BRUTAL</button>
            <button class="btn btn-danger hidden" id="btnS" onclick="stopAB()">🛑 STOP WAR</button>
        </div>
    </div>

    <div class="autobuy-panel" id="abP">
        <div style="color:var(--accent); font-weight:800; margin-bottom:16px">🔥 WAR IS ACTIVE — MEGA BRUTAL 2.0</div>
        <div class="ab-stats">
            <div class="ab-stat"><div class="val" id="abAtt">0</div><div class="lab">Attempts</div></div>
            <div class="ab-stat"><div class="val" id="abFnd">0</div><div class="lab">Found</div></div>
            <div class="ab-stat"><div class="val" id="abSpd">0</div><div class="lab">Req/S</div></div>
        </div>
    </div>

    <div class="orders-container" id="oList"></div>
</div>

<div class="toast-box" id="tBox"></div>

<script>
    const socket = io({transports:['websocket','polling']});
    let sel = 'vietnam';
    let acts = {};
    let timers = {};
    let counts = {t:0, o:0, w:0};

    // --- LOGIKA SAVE/LOAD HISTORY ---
    function saveHistory() {
        localStorage.setItem('herosms_history', JSON.stringify(acts));
        localStorage.setItem('herosms_stats', JSON.stringify(counts));
    }

    function loadHistory() {
        const h = localStorage.getItem('herosms_history');
        const s = localStorage.getItem('herosms_stats');
        if(s) { counts = JSON.parse(s); updateStats(); }
        if(h) {
            acts = JSON.parse(h);
            const now = Date.now() / 1000;
            const oList = document.getElementById('oList');
            oList.innerHTML = ''; // Clear empty state
            
            // Urutkan & Filter yang < 20 menit
            Object.values(acts)
                .sort((a,b) => a.order_time - b.order_time)
                .forEach(d => {
                    const elapsed = now - d.order_time;
                    if(elapsed < 1200) { // Masih valid (< 20 menit)
                        renderOrder(d);
                        if(d.status === 'waiting') {
                            startTimer(d.id, d.order_time);
                        } else {
                            // Update UI untuk status non-waiting
                            const el = document.getElementById(`order_${d.id}`);
                            if(d.status === 'got_otp') {
                                el.querySelector('.order-meta').innerHTML = `<div class="otp-box">${d.code}</div>`;
                                stopTimer(d.id);
                            } else {
                                el.querySelector('.order-meta').innerHTML = `<span class="status-badge" style="background:var(--red); color:#fff">${d.status}</span>`;
                                el.style.opacity = '0.5';
                            }
                        }
                    } else {
                        delete acts[d.id];
                    }
                });
            saveHistory();
        }
    }

    const COUNTRIES = {
        vietnam: {n:'Vietnam', f:'🇻🇳'},
        philipina: {n:'Philipina', f:'🇵🇭'},
        colombia: {n:'Colombia', f:'🇨🇴'},
        mexico: {n:'Mexico', f:'🇲🇽'},
        brazil: {n:'Brazil', f:'🇧🇷'}
    };

    // Render Grid
    const g = document.getElementById('cGrid');
    Object.entries(COUNTRIES).forEach(([k,v]) => {
        const d = document.createElement('div');
        d.className = `country-card ${k==sel?'selected':''}`;
        d.id = `card_${k}`;
        d.onclick = () => {
            sel = k;
            document.querySelectorAll('.country-card').forEach(x=>x.classList.remove('selected'));
            d.classList.add('selected');
            document.getElementById('selName').innerText = `🛒 Nembak Nomor ${v.n}`;
        };
        d.innerHTML = `<div class="flag">${v.f}</div><div class="name">${v.n}</div>`;
        g.appendChild(d);
    });


    // AUTO LOGIN
    window.onload = () => {
        const p = localStorage.getItem('herosms_pass');
        if(p) {
            document.getElementById('passInput').value = p;
            setTimeout(login, 500);
        }
    };

    function login() { 
        const p = document.getElementById('passInput').value;
        socket.emit('login', {password: p}); 
    }
    socket.on('login_result', d => {
        if(d.success) {
            const p = document.getElementById('passInput').value;
            localStorage.setItem('herosms_pass', p);
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            const k = localStorage.getItem('api_key');
            if(k) { document.getElementById('apiInput').value=k; setKey(); }
            loadHistory(); // Load history setelah login sukses
        } else {
            toast('❌ Pass Salah!', 'red');
            localStorage.removeItem('herosms_pass');
        }
    });

    function setKey() {
        const k = document.getElementById('apiInput').value;
        localStorage.setItem('api_key', k);
        socket.emit('set_api_key', {api_key: k});
    }

    socket.on('api_result', d => {
        if(d.success) { toast('✅ Key Valid! Keluar Saldo.'); document.getElementById('balVal').innerText = d.balance; }
        else toast('❌ Key Error!', 'red');
    });

    socket.on('balance_update', d => document.getElementById('balVal').innerText = d.balance);

    function buy(n) { socket.emit('buy_number', {country: sel, count: n}); }
    function startAB() { socket.emit('start_autobuy', {country: sel}); }
    function stopAB() { socket.emit('stop_autobuy'); }

    socket.on('autobuy_started', d => {
        document.getElementById('btnA').classList.add('hidden');
        document.getElementById('btnS').classList.remove('hidden');
        document.getElementById('abP').classList.add('active');
        toast(`🚀 MEGA BRUTAL AKTIF: ${d.country_name}`);
    });

    socket.on('autobuy_stats', d => {
        document.getElementById('abAtt').innerText = d.attempts;
        document.getElementById('abFnd').innerText = d.found;
        document.getElementById('abSpd').innerText = d.speed;
    });

    socket.on('autobuy_stopped', d => {
        document.getElementById('btnA').classList.remove('hidden');
        document.getElementById('btnS').classList.add('hidden');
        document.getElementById('abP').classList.remove('active');
        toast(`🛑 War Berhenti. Dapat ${d.total} nomor.`);
    });

    socket.on('new_number', d => {
        counts.t++; counts.w++; updateStats();
        acts[d.id] = d; // Save ke memori
        saveHistory();  // Save ke storage
        renderOrder(d);
        startTimer(d.id, d.order_time);
    });

    socket.on('order_update', d => {
        const el = document.getElementById(`order_${d.id}`);
        if(acts[d.id]) {
            acts[d.id].status = d.status;
            if(d.code) acts[d.id].code = d.code;
            saveHistory();
        }
        if(!el) return;
        if(d.status === 'got_otp') {
            counts.o++; counts.w--; updateStats();
            stopTimer(d.id);
            el.querySelector('.order-meta').innerHTML = `<div class="otp-box">${d.code}</div>`;
            el.querySelector('.timer').innerText = '✅ OTP FINISHED';
            playBeep();
        } else if(['cancelled','timeout'].includes(d.status)) {
            counts.w--; updateStats();
            stopTimer(d.id);
            el.querySelector('.order-meta').innerHTML = `<span class="status-badge" style="background:var(--red); color:#fff">${d.status}</span>`;
            el.style.opacity = '0.5';
        }
    });

    function renderOrder(d) {
        const list = document.getElementById('oList');
        const card = document.createElement('div');
        card.className = 'order-card';
        card.id = `order_${d.id}`;
        
        // Split number
        const num = d.number;
        const cc = d.country_code || '';
        const body = num.startsWith(cc) ? num.slice(cc.length) : num;

        card.innerHTML = `
            <div class="order-info">
                <span style="font-size:24px">${COUNTRIES[d.country]?.f || '🌍'}</span>
                <div>
                    <div class="order-num-box">
                        <span class="cc-code" onclick="copy('${cc}')">${cc}</span>
                        <span class="phone-num" onclick="copy('${body}')">${body}</span>
                    </div>
                    <div class="order-sub-meta">
                        <span style="color:var(--text-dim); font-size:12px">💰 <b>${d.price || '0.00'}</b> USD</span>
                        <span style="color:var(--accent); font-size:11px; margin-left:8px; opacity:0.8">#${d.id}</span>
                    </div>
                    <span class="copy-hint">Klik kode/nomor untuk salin</span>
                </div>
            </div>
            <div class="order-meta">
                <div class="timer hidden" id="time_${d.id}">20:00</div>
                <button id="cancel_${d.id}" class="btn btn-ghost" style="padding:4px 10px; font-size:11px; opacity:0.3; cursor:not-allowed" onclick="if(!this.disabled) socket.emit('cancel_order', {id:'${d.id}'})" disabled>✕ Wait 2m</button>
            </div>
        `;
        list.prepend(card);
    }

    function startTimer(id, st) {
        timers[id] = setInterval(() => {
            const elTime = (Date.now()/1000 - st);
            const rem = 1200 - elTime;
            
            // Logic Unlock Cancel (2 Menit = 120 Detik)
            const cancelBtn = document.getElementById(`cancel_${id}`);
            if(cancelBtn) {
                if(elTime >= 120) {
                    cancelBtn.disabled = false;
                    cancelBtn.style.opacity = '1';
                    cancelBtn.style.cursor = 'pointer';
                    cancelBtn.style.color = 'var(--red)';
                    cancelBtn.style.borderColor = 'rgba(239,68,68,0.3)';
                    cancelBtn.innerText = '✕ Cancel';
                } else {
                    const wait = Math.ceil(120 - elTime);
                    cancelBtn.innerText = `✕ Wait ${wait}s`;
                }
            }

            if(rem <= 0) { clearInterval(timers[id]); return; }
            const m = Math.floor(rem/60), s = Math.floor(rem%60);
            const el = document.getElementById(`time_${id}`);
            if(el) el.innerText = `${m}:${s<10?'0':''}${s}`;
        }, 1000);
    }
    function stopTimer(id) { clearInterval(timers[id]); }

    function updateStats() {
        document.getElementById('statT').innerText = counts.t;
        document.getElementById('statO').innerText = counts.o;
        document.getElementById('statW').innerText = counts.w;
    }

    function copy(txt) {
        navigator.clipboard.writeText(txt);
        toast(`📋 Copied: ${txt}`);
    }

    function toast(m, c=null) {
        const b = document.getElementById('tBox');
        const x = document.createElement('div');
        x.className = 'toast';
        if(c) x.style.borderColor = c;
        x.innerText = m;
        b.appendChild(x);
        setTimeout(() => { x.style.opacity='0'; setTimeout(()=>x.remove(),300); }, 3000);
    }

    function playBeep() {
        const a = new AudioContext();
        const o = a.createOscillator();
        const g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.frequency.value = 880; o.start();
        g.gain.exponentialRampToValueAtTime(0.00001, a.currentTime + 0.5);
    }
</script>
</body>
</html>
